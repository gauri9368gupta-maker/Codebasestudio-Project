<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codebase:- Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<div class="calculator">

    <h1>ADVANCED CALCULATOR</h1>

    <input type="text" class="input calculation_area" readonly>

    <div class="history-controls">
        <button class="btn small" onclick="toggleHistory()">History</button>
        <button class="btn small danger" onclick="clearHistory()">Clear</button>
    </div>

    <div class="history" id="historyBox">
        <ul class="history-list"></ul>
    </div>

    <div class="grid">

        <button class="btn danger" onclick="clearValue()">AC</button>
        <button class="btn" onclick="percentage()">%</button>
        <button class="btn" onclick="showValue('/')">/</button>
        <button class="btn" onclick="backspace()">⌫</button>

        <button class="btn" onclick="showValue('7')">7</button>
        <button class="btn" onclick="showValue('8')">8</button>
        <button class="btn" onclick="showValue('9')">9</button>
        <button class="btn op" onclick="showValue('*')">×</button>

        <button class="btn" onclick="showValue('4')">4</button>
        <button class="btn" onclick="showValue('5')">5</button>
        <button class="btn" onclick="showValue('6')">6</button>
        <button class="btn op" onclick="showValue('-')">-</button>

        <button class="btn" onclick="showValue('1')">1</button>
        <button class="btn" onclick="showValue('2')">2</button>
        <button class="btn" onclick="showValue('3')">3</button>
        <button class="btn op" onclick="showValue('+')">+</button>

        <button class="btn" onclick="showValue('00')">00</button>
        <button class="btn" onclick="showValue('0')">0</button>
        <button class="btn" onclick="showValue('.')">.</button>
        <button class="btn op" onclick="toggleSign()">+/-</button>

        <button class="equal" onclick="calculate()">=</button>

    </div>
</div>

<script src="script.js"></script>
</body>

</html>
